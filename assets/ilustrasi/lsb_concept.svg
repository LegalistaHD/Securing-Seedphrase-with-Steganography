<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 18px sans-serif; }
    .label { font: 14px sans-serif; }
    .binary { font: 12px monospace; }
    .highlight { fill: red; }
    svg { font-family: sans-serif; }
  </style>
  <text x="100" y="30" class="title">LSB Steganography Concept</text>
  
  <rect x="20" y="60" width="100" height="100" fill="#aaddff" stroke="black" />
  <text x="50" y="115" class="label">Pixel</text>

  <g transform="translate(150, 70)">
    <text class="label">Blue Channel Value: 253</text>
    <text y="20" class="label">Binary:</text>
    <text y="40" class="binary">1111110</text>
    <text x="70" y="40" class="binary highlight">1</text>
    <text y="70" class="label">Message bit to hide: 0</text>
    <text y="90" class="label">New Blue Value: 252</text>
    <text y="110" class="binary">1111110</text>
    <text x="70" y="110" class="binary highlight">0</text>
  </g>
</svg>